{% extends 'base.html' %}

{% block title %}Mediconnect - Login{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh] px-4 text- White mt-10 pt-10">
    <div
        class="w-full max-w-md bg-white/30 backdrop-blur-md border border-white/50 shadow-[0_8px_32px_rgba(0,0,0,0.1)] rounded-2xl p-8">
        <h2 class="text-3xl font-bold text-white mb-2 text-center">Login</h2>
        <p class="text-white mb-8 text-center text-sm">Please log in to book appointment</p>

        <form action="#" method="POST" class="flex flex-col gap-5">
            <div>
                <label class="block text-white font-medium mb-1" for="email">Email</label>
                <input type="email" id="email"
                    class="w-full px-4 py-3 bg-white/20 border border-white/70 rounded-lg focus:outline-none focus:border-[#5F6FFF] focus:ring-1 focus:ring-[#5F6FFF] text-white placeholder-black placeholder-opacity-70 transition-colors"
                    placeholder="john@example.com">
            </div>

            <div>
                <label class="block text-white font-medium mb-1" for="password">Password</label>
                <input type="password" id="password"
                    class="w-full px-4 py-3 bg-white/20 border border-white/70 rounded-lg focus:outline-none focus:border-[#5F6FFF] focus:ring-1 focus:ring-[#5F6FFF] text-white placeholder-black placeholder-opacity-70 transition-colors"
                    placeholder="••••••••">
            </div>

            <button type="submit"
                class="w-full bg-blue-900 border border-[#5F6FFF] text-white font-medium py-3 rounded-lg mt-2 transition-all duration-300 hover:bg-[#5F6FFF] hover:text-white shadow-md hover:shadow-lg">Login</button>

            <p class="text-center text-white/90 text-sm mt-4">
                Create a new account? <a href="{{ url_for('signup') }}" class="text-red-900 hover:underline font-medium">Click here</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
